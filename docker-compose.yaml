services:
  notification_server:
    container_name: notification_server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:6.1.1
    expose:
      - "2181"
    env_file:
      - .env

  kafka:
    image: confluentinc/cp-kafka:6.1.1
    depends_on:
      - zookeeper
    expose:
      - "29092"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10

  init-kafka:
    image: confluentinc/cp-kafka:6.1.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      echo 'Creating topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic agro.notification.requests --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic agro.notification.responses --replication-factor 1 --partitions 3
      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  mongo:
    image: mongo:7.0
    container_name: notification_mongo
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mongo_data:

networks:
  default:
    name: agronetwork
    external: true